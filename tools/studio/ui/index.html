<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio · BASE</title>
    <!-- Dark by default: apply the stored choice, else dark, before first paint (no flash). -->
    <script>
      try {
        document.documentElement.setAttribute("data-theme", localStorage.getItem("studio-theme") || "dark");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
